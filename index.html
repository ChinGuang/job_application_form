<!doctype html>
<html>
    <head>
        <title>Job Application Form</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <header>
            <img
                src="assets/images/company_logo.jpg"
                alt="Company Logo"
                width="100"
                height="100"
            />
            <h1>Job Application Form</h1>
        </header>
        <form method="post" enctype="multipart/form-data">
            <fieldset>
                <legend>Personal Information</legend>
                <div class="form-field">
                    <label class="form-field-title" for="fullname"
                        >Full Name:</label
                    >
                    <input
                        type="text"
                        id="fullname"
                        name="full_name"
                        minlength="3"
                        required
                    />
                    <span class="form-field-error"></span>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="email">Email:</label>
                    <input type="email" id="email" name="email" required />
                    <span class="form-field-error"></span>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="phone"
                        >Phone Number:</label
                    >
                    <input
                        type="tel"
                        id="phone"
                        name="phone"
                        pattern="^(\+?6?0)[0-9]{9,10}$"
                        placeholder="0123456789"
                        required
                    />
                    <span class="form-field-error"></span>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="dob"
                        >Date of Birth:</label
                    >
                    <input type="date" id="dob" name="dob" required />
                    <span class="form-field-error"></span>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="gender">Gender:</label>
                    <div class="form-options" required>
                        <div class="form-option">
                            <input
                                type="radio"
                                id="male"
                                name="gender"
                                value="male"
                                required
                            />
                            <label for="male">Male</label>
                        </div>
                        <div class="form-option">
                            <input
                                type="radio"
                                id="female"
                                name="gender"
                                value="female"
                                required
                            />
                            <label for="female">Female</label>
                        </div>
                        <div class="form-option">
                            <input
                                type="radio"
                                id="other"
                                name="gender"
                                value="other"
                                required
                            />
                            <label for="other">Other</label>
                        </div>
                    </div>
                </div>
            </fieldset>
            <fieldset>
                <legend>Position Details</legend>
                <div class="form-field">
                    <label class="form-field-title" for="position"
                        >Position Apply</label
                    >
                    <select id="position" name="position" required>
                        <option value="intern">Intern</option>
                        <option value="junior">Junior</option>
                        <option value="senior">Senior</option>
                    </select>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="salary" name="salary">
                        Expected Salary (RM)
                    </label>
                    <input
                        type="number"
                        id="salary"
                        name="salary"
                        min="1500"
                        max="50000"
                        step="100"
                        required
                    />
                    <span class="form-field-error"></span>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="availabledate"
                        >Available Start Date</label
                    >
                    <input
                        type="date"
                        id="availabledate"
                        name="available_date"
                        required
                    />
                    <span class="form-field-error"></span>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="worktype"
                        >Work Type</label
                    >
                    <div class="form-options" required>
                        <div class="form-option">
                            <input
                                type="checkbox"
                                id="remote"
                                name="work_type"
                                value="remote"
                            />
                            <label for="remote">Remote</label>
                        </div>
                        <div class="form-option">
                            <input
                                type="checkbox"
                                id="onsite"
                                name="work_type"
                                value="onsite"
                            />
                            <label for="onsite">Onsite</label>
                        </div>
                        <div class="form-option">
                            <input
                                type="checkbox"
                                id="hybrid"
                                name="work_type"
                                value="hybrid"
                            />
                            <label for="hybrid">Hybrid</label>
                        </div>
                    </div>
                </div>
            </fieldset>
            <fieldset>
                <legend>Skills & Experience</legend>
                <div class="form-field">
                    <label class="form-field-title" for="experience"
                        >Years of Experience</label
                    >
                    <input
                        type="number"
                        id="experience"
                        name="experience"
                        min="0"
                        max="40"
                        required
                    />
                    <span class="form-field-error"></span>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="skills"
                        >Technical Skills</label
                    >
                    <textarea
                        id="skills"
                        name="skills"
                        minlength="20"
                        rows="5"
                        required
                    ></textarea>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="portfolio"
                        >Portfolio URL</label
                    >
                    <input type="url" id="portfolio" name="portfolio" />
                </div>
            </fieldset>
            <fieldset>
                <legend>File Upload</legend>
                <div class="form-field">
                    <label class="form-field-title" for="resume">Resume</label>
                    <div class="upload-zone">
                        <label class="drop-zone" id="drop-zone-resume">
                            Drop .pdf file here, click to upload.
                            <input
                                type="file"
                                class="file-input"
                                id="resume"
                                name="resume"
                                accept=".pdf"
                                required
                            />
                        </label>
                        <ul id="preview-resume" class="preview"></ul>
                        <button
                            type="button"
                            id="clear-btn-resume"
                            class="clear-btn"
                        >
                            Clear
                        </button>
                    </div>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="profilephoto"
                        >Profile Photo</label
                    >
                    <div class="upload-zone">
                        <label class="drop-zone" id="drop-zone-profile">
                            Drop images here, or click to upload.
                            <input
                                type="file"
                                class="file-input"
                                id="profilephoto"
                                name="profile_photo"
                                accept="image/*"
                            />
                        </label>
                        <ul id="preview-profile" class="preview"></ul>
                        <button
                            type="button"
                            id="clear-btn-profile"
                            class="clear-btn"
                        >
                            Clear
                        </button>
                    </div>
                </div>
            </fieldset>
            <fieldset>
                <legend>Account Setup</legend>
                <div class="form-field">
                    <label class="form-field-title" for="password">
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        minlength="8"
                        required
                    />
                    <div class="strength-bar-container">
                        <div id="strength-fill"></div>
                    </div>
                    <span class="form-field-error"></span>
                </div>
                <div class="form-field">
                    <label class="form-field-title" for="confirm_password">
                        Confirm Password
                    </label>
                    <input
                        type="password"
                        id="confirm_password"
                        name="confirm_password"
                        required
                    />
                    <span class="form-field-error"></span>
                </div>
                <div class="form-field">
                    <label for="agreetoterm">Agree to Terms</label>
                    <input
                        type="checkbox"
                        id="agreetoterm"
                        name="agree_to_term"
                        required
                    />
                    <span class="form-field-error"></span>
                </div>
            </fieldset>
            <button type="submit">Submit</button>
        </form>
        <script src="script.js"></script>
    </body>
</html>
